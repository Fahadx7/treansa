[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."morning-report"]
  schedule = "30 6 * * 0-4"

[[redirects]]
  from = "/api/tasi-index"
  to = "/.netlify/functions/tasi-index"
  status = 200
  force = true

[[redirects]]
  from = "/api/stock-price"
  to = "/.netlify/functions/stock-price"
  status = 200
  force = true

[[redirects]]
  from = "/api/stock-chart"
  to = "/.netlify/functions/stock-chart"
  status = 200
  force = true

[[redirects]]
  from = "/api/commodities"
  to = "/.netlify/functions/commodities"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
